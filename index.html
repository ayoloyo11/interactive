<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>interactive-rating-component-main</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rating-I">
    <img class="star" src="icon-star.svg" alt="star" >
    <h2 class="fonts-1">How did we do?</h2>
    <p class="p">Please let us know how we did with your support request.
       All feedback is appreciated to help us improve our offering!
    </p>
    
    <button class="rating-btn button1">1</button>
    <button class="rating-btn button2">2</button>
    <button class="rating-btn button3">3</button>
    <button class="rating-btn button4">4</button>
    <button class="rating-btn button5">5</button>
    
    <a href="https://ayoloyo11.github.io/htmlclass/" class="button-link">Submit</a>
</div>
