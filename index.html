<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Rating Component - Thank You</title>
  
  <!-- Google Fonts: Overpass -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card-container">
    <div class="card thank-you-card">
      
      <!-- Illustration -->
      <div class="illustration-container">
        <!-- Replace the src with your actual path to the thank-you SVG -->
        <img src="illustration-thank-you.svg" alt="Thank you illustration" class="illustration">
      </div>

      <!-- Selection Badge -->
      <div class="selection-badge">
        <p>You selected 4 out of 5</p>
      </div>

      <!-- Typography -->
      <h1 class="card-title">Thank you!</h1>
      <p class="card-description">
        We appreciate you taking the time to give a rating. If you ever need more support, don't hesitate to get in touch!
      </p>

    </div>
  </main>

</body>
</html>
